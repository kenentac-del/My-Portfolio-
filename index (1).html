<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Progress</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #f4f4f4;
}

/* SIDEBAR */
.sidebar {
    width: 30vw;
    height: 100vh;
    background: #132f57;
    color: white;
    padding: 20px;
    
}


.sidebar img {
    text-align: center;
    font-size: 35px;
    font-weight: bold;
    border: 3px solid white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    height:  100px;
    width:    100px ;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 10px;
}



.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    padding: 12px;
    margin: 10px 0;
    cursor: pointer;
    border-radius: 8px;
}

.sidebar ul li:hover {
    background: #3b6fc4;
}

/* MAIN CONTENT */
.main {
    
    width: 70vw;
}

/* NAVBAR */
.navbar {
    width 100%;
    display: flex;
    justify-content: end;
    padding: 50px:
    border: 1px solid black;
    background: #e5e5e5:
    background-size: 50%;
}

.navbar a {
    margin-right: 30px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}

/* HOME SECTION */
.home {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 50px;
    min-height: 100vh;
    background-image: url('back.png');
    background-size: cover;
    
}

.home-text h1 {
    font-size: 50px;
   
}

.home-text h2 {
    color: #3b6fc4;
    margin: 10px 0;
}

.home-text p {
    margin: 20px 0;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background: #3b6fc4;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

/* IMAGE */
.home img {
    width: 350px;
    
    border: 1px solid black;

}


</style>

</head>

<body>

<!-- SIDEBAR -->



<div class="sidebar">
  
    <img src="logo.png" alt="Logo">
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Projects</li>
        <li>Contacts</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#">Project</a>
        <a href="#">Contact</a>
    </div>

    <!-- HOME -->
    <section id="home" class="home fade">
        <div class="home-text">
            <h1>Hi, I'm Ken</h1>
            <h2>Computer Engineering Technology Student</h2>
            <p>Student • Developer • Technologically driven</p>
            <a href="#" class="btn">View My Work</a>
        </div>

        <img src="ken.jpg" alt="Profile">
    </section>

   

            
        

</div>

</body>
</html>
