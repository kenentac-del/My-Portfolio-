<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Progress</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #f4f4f4;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #132f57;
    color: white;
    padding: 20px;
    position: fixed;
}

.logo {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    border: 3px solid white;
    border-radius: 50%;
    padding: 20px;
    margin-bottom: 30px;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    padding: 12px;
    margin: 10px 0;
    cursor: pointer;
    border-radius: 8px;
}

.sidebar ul li:hover {
    background: #3b6fc4;
}

/* MAIN CONTENT */
.main {
    margin-left: 220px;
    width: 100%;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: flex-end;
    padding: 20px;
    background: #e5e5e5;
}

.navbar a {
    margin-left: 20px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}

/* HOME SECTION */
.home {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 50px;
    min-height: 100vh;
}

.home-text h1 {
    font-size: 50px;
}

.home-text h2 {
    color: #3b6fc4;
    margin: 10px 0;
}

.home-text p {
    margin: 20px 0;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background: #3b6fc4;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

/* IMAGE */
.home img {
    width: 300px;
    border-radius: 10px;
}


</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">KR</div>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Projects</li>
        <li>Contacts</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#">Project</a>
        <a href="#">Contact</a>
    </div>

    <!-- HOME -->
    <section id="home" class="home fade">
        <div class="home-text">
            <h1>Hi, I'm Ken</h1>
            <h2>Computer Engineering Technology Student</h2>
            <p>Student • Developer • Technologically driven</p>
            <a href="#" class="btn">View My Work</a>
        </div>

        <!-- Replace with your image -->
        <img src="ken.jpg" alt="Profile">
    </section>

   

            
        </div>
    </section>

</div>

</body>
</html>
